## Managed component dependencies (fetched by the IDF Component Manager at build).
##
## espressif/mdns provides multicast-DNS (.local) name resolution so the device
## is reachable at  http://<MDNS_HOSTNAME>.local:<ADMIN_PORT>  regardless of the
## IP the DHCP server hands out. Since ESP-IDF v5.0 mdns is no longer bundled in
## the core and must be declared here.
dependencies:
  espressif/mdns: "^1.2"
  # Real SSH server for the port-22 honeypot: wolfSSH completes a genuine SSH-2.0
  # handshake so the attacker actually logs in (credentials captured in the
  # user-auth callback) and lands in the fake shell. wolfSSH pulls wolfSSL (crypto).
  wolfssl/wolfssh: "^1.4.20"
  wolfssl/wolfssl: "^5.8.0"
  idf:
    version: ">=5.0"
